<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Payload Diff</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --text-bright: #f0f6fc;
    --add-bg: #12261e;
    --add-border: #238636;
    --add-text: #3fb950;
    --del-bg: #2d1215;
    --del-border: #da3633;
    --del-text: #f85149;
    --mod-bg: #272115;
    --mod-border: #d29922;
    --mod-text: #e3b341;
    --line-num: #484f58;
    --accent: #58a6ff;
    --header-bg: #1c2128;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-bright);
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
  }
  .app-title svg { flex-shrink: 0; }
  .header-actions { display: flex; gap: 10px; align-items: center; }

  /* BUTTONS */
  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn:hover { background: #1f2937; border-color: var(--text-dim); }
  .btn-primary { background: #238636; border-color: #238636; color: #fff; }
  .btn-primary:hover { background: #2ea043; }
  .btn-danger { color: var(--del-text); }
  .btn-danger:hover { background: var(--del-bg); border-color: var(--del-border); }

  /* INPUT AREA */
  .input-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }
  .input-pane {
    display: flex;
    flex-direction: column;
  }
  .input-pane:first-child { border-right: 1px solid var(--border); }
  .input-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-dim);
    padding: 10px 16px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .input-label .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .input-pane:first-child .dot { background: var(--del-text); }
  .input-pane:last-child .dot { background: var(--add-text); }

  textarea {
    width: 100%;
    min-height: 180px;
    background: var(--bg);
    color: var(--text);
    border: none;
    padding: 14px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    line-height: 1.6;
    resize: vertical;
    outline: none;
  }
  textarea::placeholder { color: var(--line-num); }
  textarea:focus { background: #0b0f14; }

  /* DIFF OUTPUT */
  .diff-container {
    padding: 0;
  }

  .diff-file-header {
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 63px;
    z-index: 50;
  }
  .diff-stats {
    display: flex;
    gap: 14px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .stat-add { color: var(--add-text); }
  .stat-del { color: var(--del-text); }
  .stat-mod { color: var(--mod-text); }

  /* DIFF TABLE */
  .diff-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    line-height: 1.55;
    table-layout: fixed;
  }
  .diff-table td {
    padding: 1px 12px;
    vertical-align: top;
    border: none;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* Line number columns */
  .diff-table .ln {
    width: 44px;
    min-width: 44px;
    color: var(--line-num);
    text-align: right;
    padding-right: 10px;
    user-select: none;
    font-size: 0.72rem;
    border-right: 1px solid var(--border);
  }

  /* Gutter / indicator column */
  .diff-table .gutter {
    width: 24px;
    min-width: 24px;
    text-align: center;
    font-weight: 700;
    user-select: none;
    padding: 1px 4px;
  }

  /* Content columns */
  .diff-table .content {
    width: calc(50% - 56px);
  }

  /* Separator between left and right */
  .diff-table .sep {
    width: 1px;
    min-width: 1px;
    padding: 0;
    background: var(--border);
  }

  /* Row types */
  .diff-table tr.row-equal td { background: var(--bg); }
  .diff-table tr.row-equal td.ln { background: var(--bg); }

  .diff-table tr.row-del td { background: var(--del-bg); }
  .diff-table tr.row-del td.ln { background: #2a1215; }
  .diff-table tr.row-del td.gutter { color: var(--del-text); }

  .diff-table tr.row-add td { background: var(--add-bg); }
  .diff-table tr.row-add td.ln { background: #0f2318; }
  .diff-table tr.row-add td.gutter { color: var(--add-text); }

  .diff-table tr.row-mod-left td { background: var(--del-bg); }
  .diff-table tr.row-mod-left td.ln { background: #2a1215; }
  .diff-table tr.row-mod-left td.gutter { color: var(--del-text); }

  .diff-table tr.row-mod-right td { background: var(--add-bg); }
  .diff-table tr.row-mod-right td.ln { background: #0f2318; }
  .diff-table tr.row-mod-right td.gutter { color: var(--add-text); }

  /* Inline highlights for changed parts */
  .hl-del { background: #f8514933; color: var(--del-text); border-radius: 3px; padding: 0 2px; }
  .hl-add { background: #3fb95033; color: var(--add-text); border-radius: 3px; padding: 0 2px; }

  /* Hunk header */
  .diff-table tr.hunk-header td {
    background: #1c2128;
    color: var(--accent);
    font-weight: 500;
    padding: 6px 12px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  /* Collapse/expand */
  .collapse-row td {
    background: var(--header-bg);
    color: var(--text-dim);
    text-align: center;
    padding: 4px;
    font-size: 0.72rem;
    cursor: pointer;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .collapse-row:hover td { background: #1f2937; color: var(--accent); }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    color: var(--text-dim);
    text-align: center;
    gap: 12px;
  }
  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 0.9rem; max-width: 400px; line-height: 1.6; }

  /* Options bar */
  .options-bar {
    display: flex;
    gap: 16px;
    align-items: center;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
  }
  .option-label {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
  }
  .option-label input[type="checkbox"] {
    accent-color: var(--accent);
  }
  .option-label input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    width: 160px;
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 0.82rem;
    color: var(--text);
    z-index: 200;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* Ignore keys tag input */
  .tag-input-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tag-input-wrap input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    width: 150px;
  }
  .tag-input-wrap input[type="text"]:focus { border-color: var(--accent); outline: none; }
  .tag-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #1e293b;
    border: 1px solid var(--border);
    color: var(--mod-text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .tag-chip .tag-remove {
    cursor: pointer;
    color: var(--text-dim);
    font-size: 0.85rem;
    line-height: 1;
    margin-left: 2px;
    transition: color 0.15s;
  }
  .tag-chip .tag-remove:hover { color: var(--del-text); }
  .tag-chip .tag-scope { color: var(--text-dim); font-weight: 400; }
  .tag-chip.tag-global { border-color: #4a4520; background: #1e1d12; }
  .tag-chip.tag-scoped { border-color: #1e3a5f; background: #111c2e; color: var(--accent); }
  .tag-chip.tag-scoped .tag-scope { color: #4a7fad; }

  .ignore-hint {
    display: block;
    width: 100%;
    font-size: 0.7rem;
    color: var(--line-num);
    margin-top: 4px;
    line-height: 1.5;
  }
  .ignore-hint code {
    font-family: 'JetBrains Mono', monospace;
    background: #1e293b;
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--text-dim);
    font-size: 0.68rem;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .app-header { padding: 14px 16px; flex-wrap: wrap; }
    .input-container { grid-template-columns: 1fr; }
    .input-pane:first-child { border-right: none; border-bottom: 1px solid var(--border); }
    .diff-table { font-size: 0.7rem; }
    .diff-table .ln { width: 32px; min-width: 32px; }
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v12"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>
    JSON Diff
  </div>
  <div class="header-actions">
    <button class="btn" id="btnSample" title="Load sample payloads">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Sample
    </button>
    <button class="btn btn-danger" id="btnClear">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      Clear
    </button>
    <button class="btn btn-primary" id="btnCompare">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      Compare
    </button>
  </div>
</div>

<div class="options-bar">
  <label class="option-label">
    <input type="checkbox" id="optIgnoreOrder" checked>
    Sort arrays before comparing
  </label>
  <label class="option-label">
    Sort key:
    <input type="text" id="optSortKey" placeholder="e.g. allowance_subtype" value="">
  </label>
  <label class="option-label">
    <input type="checkbox" id="optCollapseEqual" checked>
    Collapse unchanged sections
  </label>
</div>
<div class="options-bar" style="border-top: none; padding-top: 0;">
  <label class="option-label" style="align-items: flex-start; gap: 8px;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-top:2px;flex-shrink:0"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
    Ignore keys:
    <div class="tag-input-wrap" id="ignoreKeysWrap">
      <input type="text" id="optIgnoreKeysInput" placeholder="parent.key or key + Enter">
    </div>
    <span class="ignore-hint">scope with dot path: <code>added_offers.service_type</code> · bare key = global: <code>technician_appointment</code></span>
  </label>
</div>


<div class="input-container" id="inputArea">
  <div class="input-pane">
    <div class="input-label"><span class="dot"></span> Payload 1 (left / old)</div>
    <textarea id="input1" placeholder='Paste JSON payload 1 here...'></textarea>
  </div>
  <div class="input-pane">
    <div class="input-label"><span class="dot"></span> Payload 2 (right / new)</div>
    <textarea id="input2" placeholder='Paste JSON payload 2 here...'></textarea>
  </div>
</div>

<div class="diff-container" id="diffOutput">
  <div class="empty-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 3v12"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>
    <p>Paste two JSON payloads above and click <strong>Compare</strong> to see a git-style side-by-side diff.</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ──── Utility ────
const ignoreRules = []; // Array of strings: "key" (global) or "parent.key" (scoped)

function parseIgnoreRule(rule) {
  const dot = rule.lastIndexOf('.');
  if (dot === -1) return { scope: null, key: rule };
  return { scope: rule.substring(0, dot), key: rule.substring(dot + 1) };
}

function renderIgnoreTags() {
  const wrap = document.getElementById('ignoreKeysWrap');
  wrap.querySelectorAll('.tag-chip').forEach(el => el.remove());
  const input = document.getElementById('optIgnoreKeysInput');
  for (let i = 0; i < ignoreRules.length; i++) {
    const rule = ignoreRules[i];
    const { scope, key } = parseIgnoreRule(rule);
    const isScoped = scope !== null;
    const chip = document.createElement('span');
    chip.className = 'tag-chip ' + (isScoped ? 'tag-scoped' : 'tag-global');
    const label = isScoped
      ? `<span class="tag-scope">${escHtml(scope)}.</span>${escHtml(key)}`
      : escHtml(key);
    chip.innerHTML = `${label}<span class="tag-remove" data-idx="${i}">&times;</span>`;
    wrap.insertBefore(chip, input);
  }
}

document.getElementById('optIgnoreKeysInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const val = e.target.value.trim();
    if (val && !ignoreRules.includes(val)) {
      ignoreRules.push(val);
      renderIgnoreTags();
    }
    e.target.value = '';
  }
  if (e.key === 'Backspace' && e.target.value === '' && ignoreRules.length > 0) {
    ignoreRules.pop();
    renderIgnoreTags();
  }
});

document.getElementById('ignoreKeysWrap').addEventListener('click', (e) => {
  if (e.target.classList.contains('tag-remove')) {
    const idx = parseInt(e.target.dataset.idx, 10);
    ignoreRules.splice(idx, 1);
    renderIgnoreTags();
  }
});

// Path-aware key removal
// currentPath tracks where we are in the JSON tree, e.g. "removed_offers" or "removed_offers.[]"
function deepRemoveKeys(val, rules, currentPath) {
  if (val === null || typeof val !== 'object') return val;

  if (Array.isArray(val)) {
    return val.map(v => deepRemoveKeys(v, rules, currentPath + '.[]'));
  }

  const out = {};
  for (const [k, v] of Object.entries(val)) {
    const childPath = currentPath ? currentPath + '.' + k : k;
    // Check if this key should be ignored
    let shouldIgnore = false;
    for (const rule of rules) {
      const { scope, key } = parseIgnoreRule(rule);
      if (key !== k) continue;
      if (scope === null) {
        // Global rule — ignore this key everywhere
        shouldIgnore = true;
        break;
      }
      // Scoped rule — check if the current path context matches
      // Support matching like "added_offers.service_type" when we're at path "added_offers.[].service_type"
      // We normalize by collapsing ".[]" segments for matching
      const normalizedCurrent = currentPath.replace(/\.\[\]/g, '');
      // Also try the raw currentPath for exact matches
      if (normalizedCurrent === scope || currentPath === scope || normalizedCurrent.endsWith('.' + scope) || currentPath.endsWith('.' + scope)) {
        shouldIgnore = true;
        break;
      }
      // Also match if scope is a parent segment anywhere in the path
      // e.g. rule "added_offers.service_type" should match when currentPath is "added_offers.[]"
      const scopeParts = scope.split('.');
      const pathSegments = currentPath.replace(/\.\[\]/g, '').split('.').filter(Boolean);
      // Check if the scope segments appear as a contiguous subsequence ending at the current position
      if (scopeParts.length === 1) {
        // Single parent scope: "added_offers.service_type" means key "service_type" under any "added_offers" ancestor
        if (pathSegments.includes(scopeParts[0])) {
          shouldIgnore = true;
          break;
        }
      } else {
        // Multi-level scope: check if scope appears as trailing path
        const scopeStr = scopeParts.join('.');
        const pathStr = pathSegments.join('.');
        if (pathStr === scopeStr || pathStr.endsWith('.' + scopeStr)) {
          shouldIgnore = true;
          break;
        }
      }
    }
    if (shouldIgnore) continue;
    out[k] = deepRemoveKeys(v, rules, childPath);
  }
  return out;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function deepSortValue(val, sortKey) {
  if (val === null || typeof val !== 'object') return val;
  if (Array.isArray(val)) {
    const sorted = val.map(v => deepSortValue(v, sortKey));
    // Sort arrays of objects by sortKey if present, else by stable JSON
    sorted.sort((a, b) => {
      if (sortKey && typeof a === 'object' && a !== null && typeof b === 'object' && b !== null) {
        const ka = String(a[sortKey] || '');
        const kb = String(b[sortKey] || '');
        if (ka !== kb) return ka.localeCompare(kb);
      }
      return JSON.stringify(a).localeCompare(JSON.stringify(b));
    });
    return sorted;
  }
  // Sort object keys
  const sortedObj = {};
  for (const k of Object.keys(val).sort()) {
    sortedObj[k] = deepSortValue(val[k], sortKey);
  }
  return sortedObj;
}

// ──── Diff Engine (line-based) ────
function lcsLines(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => new Uint16Array(n + 1));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i - 1] === b[j - 1] ? dp[i - 1][j - 1] + 1 : Math.max(dp[i - 1][j], dp[i][j - 1]);
  const result = [];
  let i = m, j = n;
  while (i > 0 && j > 0) {
    if (a[i - 1] === b[j - 1]) { result.push({ type: 'equal', left: i - 1, right: j - 1 }); i--; j--; }
    else if (dp[i - 1][j] >= dp[i][j - 1]) { result.push({ type: 'del', left: i - 1 }); i--; }
    else { result.push({ type: 'add', right: j - 1 }); j--; }
  }
  while (i > 0) { result.push({ type: 'del', left: i - 1 }); i--; }
  while (j > 0) { result.push({ type: 'add', right: j - 1 }); j--; }
  return result.reverse();
}

// Inline word-level diff highlight
function inlineDiff(oldStr, newStr) {
  const oldWords = oldStr.split(/(\s+)/);
  const newWords = newStr.split(/(\s+)/);
  // LCS on words
  const m = oldWords.length, n = newWords.length;
  const dp = Array.from({ length: m + 1 }, () => new Uint16Array(n + 1));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = oldWords[i - 1] === newWords[j - 1] ? dp[i - 1][j - 1] + 1 : Math.max(dp[i - 1][j], dp[i][j - 1]);

  const ops = [];
  let i = m, j = n;
  while (i > 0 && j > 0) {
    if (oldWords[i - 1] === newWords[j - 1]) { ops.push({ t: 'eq', oi: i - 1, ni: j - 1 }); i--; j--; }
    else if (dp[i - 1][j] >= dp[i][j - 1]) { ops.push({ t: 'del', oi: i - 1 }); i--; }
    else { ops.push({ t: 'add', ni: j - 1 }); j--; }
  }
  while (i > 0) { ops.push({ t: 'del', oi: i - 1 }); i--; }
  while (j > 0) { ops.push({ t: 'add', ni: j - 1 }); j--; }
  ops.reverse();

  let leftHtml = '', rightHtml = '';
  for (const op of ops) {
    if (op.t === 'eq') {
      const esc = escHtml(oldWords[op.oi]);
      leftHtml += esc;
      rightHtml += esc;
    } else if (op.t === 'del') {
      leftHtml += `<span class="hl-del">${escHtml(oldWords[op.oi])}</span>`;
    } else {
      rightHtml += `<span class="hl-add">${escHtml(newWords[op.ni])}</span>`;
    }
  }
  return { leftHtml, rightHtml };
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ──── Build side-by-side diff rows ────
function buildDiffRows(linesA, linesB) {
  const ops = lcsLines(linesA, linesB);
  const rows = [];

  // Merge adjacent del+add into modifications
  let i = 0;
  while (i < ops.length) {
    if (ops[i].type === 'equal') {
      rows.push({ type: 'equal', left: linesA[ops[i].left], right: linesB[ops[i].right], ln1: ops[i].left + 1, ln2: ops[i].right + 1 });
      i++;
    } else {
      // Collect consecutive del/add
      const dels = [], adds = [];
      while (i < ops.length && ops[i].type !== 'equal') {
        if (ops[i].type === 'del') dels.push(ops[i].left);
        else adds.push(ops[i].right);
        i++;
      }
      // Pair up as modifications
      const pairs = Math.min(dels.length, adds.length);
      for (let p = 0; p < pairs; p++) {
        rows.push({ type: 'mod', left: linesA[dels[p]], right: linesB[adds[p]], ln1: dels[p] + 1, ln2: adds[p] + 1 });
      }
      for (let p = pairs; p < dels.length; p++) {
        rows.push({ type: 'del', left: linesA[dels[p]], ln1: dels[p] + 1 });
      }
      for (let p = pairs; p < adds.length; p++) {
        rows.push({ type: 'add', right: linesB[adds[p]], ln2: adds[p] + 1 });
      }
    }
  }
  return rows;
}

// ──── Render ────
function renderDiff(rows, collapseEqual) {
  const container = document.getElementById('diffOutput');
  let adds = 0, dels = 0, mods = 0;
  rows.forEach(r => { if (r.type === 'add') adds++; else if (r.type === 'del') dels++; else if (r.type === 'mod') mods++; });

  let html = `<div class="diff-file-header">
    <span>payload1.json ↔ payload2.json</span>
    <div class="diff-stats">
      <span class="stat-add">+${adds} added</span>
      <span class="stat-del">−${dels} removed</span>
      <span class="stat-mod">~${mods} modified</span>
    </div>
  </div>`;

  html += '<table class="diff-table"><tbody>';

  // Group rows for collapsing
  let i = 0;
  while (i < rows.length) {
    const r = rows[i];
    if (r.type === 'equal' && collapseEqual) {
      // Collect consecutive equal rows
      const eqStart = i;
      while (i < rows.length && rows[i].type === 'equal') i++;
      const eqCount = i - eqStart;
      if (eqCount > 6) {
        // Show first 3, collapse middle, show last 3
        for (let e = eqStart; e < eqStart + 3; e++) html += equalRow(rows[e]);
        const hidden = eqCount - 6;
        const collapseId = 'collapse_' + eqStart;
        html += `<tr class="collapse-row" onclick="expandCollapsed('${collapseId}', this)">
          <td colspan="7">⤵ ${hidden} unchanged lines hidden — click to expand</td>
        </tr>`;
        html += `<tbody id="${collapseId}" style="display:none">`;
        for (let e = eqStart + 3; e < i - 3; e++) html += equalRow(rows[e]);
        html += `</tbody>`;
        for (let e = i - 3; e < i; e++) html += equalRow(rows[e]);
      } else {
        for (let e = eqStart; e < i; e++) html += equalRow(rows[e]);
      }
    } else {
      html += diffRow(r);
      i++;
    }
  }

  html += '</tbody></table>';
  container.innerHTML = html;
}

function equalRow(r) {
  const esc = escHtml(r.left);
  return `<tr class="row-equal">
    <td class="ln">${r.ln1}</td><td class="gutter"></td><td class="content">${esc}</td>
    <td class="sep"></td>
    <td class="ln">${r.ln2}</td><td class="gutter"></td><td class="content">${esc}</td>
  </tr>`;
}

function diffRow(r) {
  if (r.type === 'del') {
    return `<tr class="row-del">
      <td class="ln">${r.ln1}</td><td class="gutter">−</td><td class="content">${escHtml(r.left)}</td>
      <td class="sep"></td>
      <td class="ln"></td><td class="gutter"></td><td class="content"></td>
    </tr>`;
  }
  if (r.type === 'add') {
    return `<tr class="row-add">
      <td class="ln"></td><td class="gutter"></td><td class="content"></td>
      <td class="sep"></td>
      <td class="ln">${r.ln2}</td><td class="gutter">+</td><td class="content">${escHtml(r.right)}</td>
    </tr>`;
  }
  if (r.type === 'mod') {
    const { leftHtml, rightHtml } = inlineDiff(r.left, r.right);
    return `<tr class="row-mod-left">
      <td class="ln">${r.ln1}</td><td class="gutter">−</td><td class="content">${leftHtml}</td>
      <td class="sep"></td>
      <td class="ln">${r.ln2}</td><td class="gutter">+</td><td class="content">${rightHtml}</td>
    </tr>`;
  }
  return '';
}

function expandCollapsed(id, triggerRow) {
  const tbody = document.getElementById(id);
  if (tbody) {
    tbody.style.display = '';
    triggerRow.style.display = 'none';
  }
}
// Expose globally for inline onclick
window.expandCollapsed = expandCollapsed;

// ──── Main Compare ────
function doCompare() {
  const raw1 = document.getElementById('input1').value.trim();
  const raw2 = document.getElementById('input2').value.trim();
  if (!raw1 || !raw2) { toast('Please paste JSON in both fields'); return; }

  let obj1, obj2;
  try { obj1 = JSON.parse(raw1); } catch (e) { toast('Payload 1: Invalid JSON — ' + e.message); return; }
  try { obj2 = JSON.parse(raw2); } catch (e) { toast('Payload 2: Invalid JSON — ' + e.message); return; }

  const ignoreOrder = document.getElementById('optIgnoreOrder').checked;
  const sortKey = document.getElementById('optSortKey').value.trim();
  const collapseEqual = document.getElementById('optCollapseEqual').checked;

  // Remove ignored keys (path-aware)
  if (ignoreRules.length > 0) {
    const parsedRules = ignoreRules.map(r => r); // pass raw strings
    obj1 = deepRemoveKeys(obj1, parsedRules, '');
    obj2 = deepRemoveKeys(obj2, parsedRules, '');
  }

  if (ignoreOrder) {
    obj1 = deepSortValue(obj1, sortKey || null);
    obj2 = deepSortValue(obj2, sortKey || null);
  }

  const json1 = JSON.stringify(obj1, null, 2);
  const json2 = JSON.stringify(obj2, null, 2);

  const lines1 = json1.split('\n');
  const lines2 = json2.split('\n');

  const rows = buildDiffRows(lines1, lines2);
  renderDiff(rows, collapseEqual);
}
